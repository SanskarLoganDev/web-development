<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transitions</title>
    <style>
        .container{
            background-color: antiquewhite;
            width: 50vw;
            height: 40vh;
        }

        .box{
            background-color: aquamarine;
            width: 5vw;
            height: 4vh;
            /* transition-property: background-color, transform; — specifies which CSS properties to animate (here: color and position/size) */
            /* transition-duration: 3s; — how long the animation takes to complete */
            /* transition-timing-function: cubic-bezier(0.22, 0.43, 0, 0.99); — controls the speed curve using custom bezier control points */
            /* transition-delay: 1s; — waits 1 second before the transition starts */

            /* shorthand: transition: <property> <duration> <timing-function> <delay>
               "all" animates every changed property, 3s duration,
               cubic-bezier sets a custom ease curve, 1s delay before starting */
            transition: all 3s cubic-bezier(0.09, 0.5, 0, 0.99) 1s;
        }

        .translate{
            /* moves the box 10vw right and 10vh down, then scales it to 2x its original size */
            transform: translateX(10vw) translateY(10vh) scale(2);
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box translate"></div>
    </div>
</body>
</html>
