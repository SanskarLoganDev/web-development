<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flex box</title>
    <style>
      /* flex-box properties are applied on the container and not the items */
        .container{
            border: 2px solid red;
            display: flex;
            height: 80vh;
            justify-content: center; /* Horizontal centering: works on main axis depending on flex-direction */
            align-items: center;     /* Vertical centering */
            /* flex-direction: column-reverse; /* Stacks items vertically in reverse order (last item appears first) */
            flex-wrap: wrap; /* Allows items to wrap onto multiple lines if they exceed container width */
            align-content: center; /* Centers wrapped lines vertically when there are multiple lines of items */
            flex-flow: row wrap; /* Shorthand for flex-direction: row and flex-wrap: wrap */
            gap: 30px; /* Adds space between items */
            /* can also define row-gap and column-gap separately or use --> gap: 10px 40px */
        }
        .item{
            /* display: inline-block; */
            height: 60px;
            width: 60px;
            background-color: blueviolet;
            margin: 2px;
            border: 2px solid black;
            /* flex-grow: 1; /* Allows the item to grow and fill available space in the container */
        }
/* order property is applied on items and not container. It means the order in which items appear in the flex container. The one with greater order will appear at the end*/
        .order-1{
            order: 1;
        }
        .order-2{
            order: 2;
        }
        .order-3{
            order: 3;
        }

        .item1{  
            /* flex-shrink: 1; */
            /* flex-shrink: 2; */
            align-self: flex-end; /* Overrides the align-items property for this specific item, aligning it to the end of the container */
        }

    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">1</div>
      <div class="item order-2">2</div>
      <div class="item order-1">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
      <div class="item">6</div>
      <div class="item">7</div>
      <div class="item">8</div>
      <div class="item">9</div>
      <div class="item">10</div>
      <div class="item">11</div>
      <div class="item">12</div>
      <div class="item">13</div>
      <div class="item">14</div>
      <div class="item">15</div>
      <div class="item">16</div>
      <div class="item">17</div>
      <div class="item">18</div>
      <div class="item">19</div>
      <div class="item">20</div>
      <div class="item">21</div>
      <div class="item">22</div>
      <div class="item">23</div>
      <div class="item">24</div>
      <div class="item">25</div>
      <div class="item">26</div>
      <div class="item item1">27</div>
      <div class="item">28</div>
      <div class="item"></div>
      <div class="item"></div>
      <div class="item"></div>
    </div>
  </body>
</html>
