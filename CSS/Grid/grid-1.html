<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        /* dont use paddingin flexbox and grid, use gap instead */
        .container {
            width: 80vw;
            height: 100vh;
            border: 2px solid black;
            display: grid;
            /* grid-template-columns: 120px 190px; */
            grid-template-columns: [first] 120px [second] 100px [t];
            grid-template-rows: 100px 100px 100px;
            /* grid-template-columns: 1fr 2fr; */ /* 1fr divides the available space into 3 equal parts and assigns 1 part to the first column and 2 parts to the second column. */
            /* grid-template-columns: repeat(4, minmax(100px, 1fr)); */
            /* grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(2, 80px); */
            /* gap: 34px; */
            row-gap: 10px;
            column-gap: 44px;
            justify-items: center;
            /* use justify-content to align the entire grid within the container, and justify-items to align individual items within their grid cells. */
            align-items: center;
        }

        .item {
            border: 2px solid red;
            height: 55px;
            width: 55px;
        }
    /* if both row and column are specified, then the item will be placed at the intersection of the specified row and column. If only one is specified, the item will be placed in the first available cell in that row or column. */
        .item-4 {
            grid-row: 1/2;
            grid-column: 1/2;
           /* grid-column: pehla/t; */
        }

        .item-1 {
            grid-row: 1/2;
            /* or you can do  */
            /* grid-row-start: 1;
            grid-row-end: 2; */

            /* same thing */
            grid-column: 1/2;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-4">4</div>
        <div class="item">5</div>
    </div>
</body>

</html>
